name: HALockBridge
options:
  # No `bundleIdPrefix:` — PRODUCT_BUNDLE_IDENTIFIER below uses
  # $(BUNDLE_ID_PREFIX) which each contributor sets in their own
  # (gitignored) DevelopmentTeam.xcconfig.
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
  # Distribution is "Release plus Developer ID manual signing." Used by
  # scripts/release.sh and the CI release workflow. We keep plain Release
  # on Automatic signing so local builds (build.sh, install.sh) keep
  # working with whatever Apple Development cert is in the contributor's
  # keychain. The Distribution-specific build settings are scoped to the
  # HALockBridge target only so SwiftPM dependencies (swift-nio, etc.) —
  # which can't accept a provisioning profile — are unaffected.
  Distribution: release
settings:
  base:
    SWIFT_VERSION: "5.9"
packages:
  swift-nio:
    url: https://github.com/apple/swift-nio
    from: 2.65.0
targets:
  HALockBridge:
    type: application
    platform: iOS
    configFiles:
      Debug: DevelopmentTeam.xcconfig
      Release: DevelopmentTeam.xcconfig
      Distribution: DevelopmentTeam.xcconfig
    sources:
      - path: Sources/HALockBridge
      - path: Resources/Assets.xcassets
        type: folder.assetcatalog
        buildPhase: resources
      # Status bar template image (Catalyst can't put this in Assets.xcassets
      # for use via NSImage(contentsOfFile:), so we ship it as a flat resource).
      - path: Resources/status-bar.png
        buildPhase: resources
      - path: Resources/status-bar@2x.png
        buildPhase: resources
    dependencies:
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - package: swift-nio
        product: NIOHTTP1
      - package: swift-nio
        product: NIOWebSocket
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: HA-LockBridge
        CFBundleName: HA-LockBridge
        LSUIElement: true
        LSRequiresIPhoneOS: false
        NSHomeKitUsageDescription: "Monitors and controls HomeKit lock accessories and bridges them to HomeAssistant."
        NSLocalNetworkUsageDescription: "Advertises this bridge on your local network so Home Assistant can discover and connect to it."
        NSBonjourServices:
          - _ha-lockbridge._tcp
        NSHumanReadableCopyright: "Copyright © 2026 Michael Nemat. Licensed under the MIT License."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      base:
        PRODUCT_NAME: HA-LockBridge
        # Resolved at build time from BUNDLE_ID_PREFIX in DevelopmentTeam.xcconfig.
        # NB: suffix is "HALockBridgeApp", not "HALockBridge" — the original
        # identifier is permanently claimed by the maintainer's free-tier
        # Personal Team from earlier local builds, and Apple doesn't release
        # Personal Team App IDs back to the pool. PRODUCT_NAME stays
        # HA-LockBridge so the on-disk .app and the user-facing name are
        # unaffected.
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID_PREFIX).HALockBridgeApp
        MARKETING_VERSION: "0.4.5"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "2,6"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: HALockBridge.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Distribution:
          # Distribution config: maintainer release path. Manual signing
          # with the Developer ID Application cert + the pre-installed
          # "HA-LockBridge Developer ID" provisioning profile. CI installs
          # the profile from a base64'd repo secret before the build runs;
          # local maintainer release runs need the profile in
          # ~/Library/Developer/Xcode/UserData/Provisioning Profiles/.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: "HA-LockBridge Developer ID"
