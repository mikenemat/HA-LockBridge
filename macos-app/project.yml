name: HALockBridge
options:
  # No `bundleIdPrefix:` — PRODUCT_BUNDLE_IDENTIFIER below uses
  # $(BUNDLE_ID_PREFIX) which each contributor sets in their own
  # (gitignored) DevelopmentTeam.xcconfig.
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
attributes:
  # Bumping this dismisses Xcode's "Update to recommended settings"
  # banner. We track Xcode 26.5 (= 2650) and mirror its current
  # recommended-settings baseline below in settings.base.
  LastUpgradeCheck: 2650
  LastSwiftUpdateCheck: 2650
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    # Xcode-recommended baseline for projects upgraded through Xcode 15+:
    # Run scripts are sandboxed (matches new project defaults). Doesn't
    # affect our build — we have no custom run scripts — but quiets the
    # recommended-settings nag.
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # Defensive: signals we want generated string-catalog symbols available
    # if we ever add localizations. No-op for the current zero-localization
    # state.
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
packages:
  swift-nio:
    url: https://github.com/apple/swift-nio
    from: 2.65.0
targets:
  HALockBridge:
    type: application
    platform: iOS
    configFiles:
      Debug: DevelopmentTeam.xcconfig
      Release: DevelopmentTeam.xcconfig
    sources:
      - path: Sources/HALockBridge
      - path: Resources/Assets.xcassets
        type: folder.assetcatalog
        buildPhase: resources
      # Apple Privacy Manifest. Required for new App Store submissions.
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - package: swift-nio
        product: NIOHTTP1
      - package: swift-nio
        product: NIOWebSocket
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: HA-LockBridge
        CFBundleName: HA-LockBridge
        # Use the MARKETING_VERSION build setting (set under `settings:` below)
        # as the source of truth so the user-visible version in App Store
        # Connect / Finder matches the version we bump in CHANGELOG.
        # Without these explicit lines xcodegen writes literal "1.0" / "1"
        # placeholders and the build never substitutes them.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Required for Mac App Store submission. "Utilities" matches the
        # actual function — this is a bridge tool, not a productivity or
        # lifestyle app. Other valid UTIs at
        # https://developer.apple.com/documentation/bundleresources/information_property_list/lsapplicationcategorytype
        LSApplicationCategoryType: "public.app-category.utilities"
        # Skips the App Store Connect "export compliance" question on every
        # upload. We use only Apple's first-party frameworks (URLSession,
        # CryptoKit, etc.); no custom crypto, no third-party crypto libraries.
        ITSAppUsesNonExemptEncryption: false
        # Appliance mode: the bridge is a normal foreground app with a Dock
        # icon and an always-visible window (NOT a hidden menu-bar utility).
        # HomeKit only services accessory writes promptly for the frontmost
        # app, so the bridge must be visible/active — see README. Was `true`
        # through 0.5.x when this was a headless menu-bar app.
        LSUIElement: false
        LSRequiresIPhoneOS: false
        NSHomeKitUsageDescription: "Monitors and controls smart lock accessories paired in your Apple Home and bridges them to Home Assistant."
        NSLocalNetworkUsageDescription: "Advertises this bridge on your local network so Home Assistant can discover and connect to it."
        NSBonjourServices:
          - _ha-lockbridge._tcp
        NSHumanReadableCopyright: "Copyright © 2026 Michael Nemat. Licensed under the MIT License."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      base:
        PRODUCT_NAME: HA-LockBridge
        # Resolved at build time from BUNDLE_ID_PREFIX in DevelopmentTeam.xcconfig.
        # NB: suffix is "HALockBridgeApp", not "HALockBridge" — the original
        # identifier is permanently claimed by the maintainer's free-tier
        # Personal Team from earlier local builds, and Apple doesn't release
        # Personal Team App IDs back to the pool. PRODUCT_NAME stays
        # HA-LockBridge so the on-disk .app and the user-facing name are
        # unaffected.
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID_PREFIX).HALockBridgeApp
        MARKETING_VERSION: "0.6.1"
        CURRENT_PROJECT_VERSION: "15"
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        TARGETED_DEVICE_FAMILY: "2,6"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: HALockBridge.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  HALockBridge:
    build:
      targets:
        HALockBridge: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
