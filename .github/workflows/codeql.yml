name: CodeQL

# Static analysis for the Python HA integration. Swift is not yet supported
# by CodeQL (as of 2026) for general-purpose analysis, so the macOS app is
# excluded — Apple's own ecosystem tooling catches Swift-specific issues at
# build time and we run that in ci.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan catches advisories published against pinned versions.
    - cron: '0 12 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
