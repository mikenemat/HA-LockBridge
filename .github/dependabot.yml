version: 2

# Dependabot keeps our dependencies and CI tooling current.
# Open a PR weekly; security advisories trigger PRs immediately regardless
# of this schedule.

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: swift
    directory: /macos-app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: bridge
      include: scope
